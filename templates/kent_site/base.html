{% load static %}
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Kent{% endblock %}</title>
    {% if request.site.slug == "kent" %}
      <link rel="stylesheet" href="{% static 'kent/css/site.css' %}" />
    {% endif %}
  </head>
  <body class="site site--{{ request.site.slug|default:'unknown' }}">
    <div class="background-layers" aria-hidden="true"></div>
    <header class="site-header" data-site-header>
      <div class="container site-header__inner">
        <a href="{% url 'home' %}" aria-label="Kent">
          <span class="logo" aria-hidden="true"></span>
        </a>
        <nav class="site-nav" aria-label="Navigation principale">
          <a class="nav-musique" href="{% url 'musique' %}">Musique</a>
          <a class="nav-dessins" href="{% url 'dessins' %}">Dessins</a>
          <a class="nav-livres" href="{% url 'livres' %}">Livres</a>
        </nav>
        <a class="shop-link" href="https://shop.kent-artiste.com" target="_blank" rel="noopener noreferrer">Shop</a>
        <button class="menu-button" type="button" aria-label="Ouvrir le menu" data-menu-toggle>☰</button>
      </div>
    </header>
    <div class="mobile-menu" data-mobile-menu>
      <div class="container mobile-menu__inner">
        <button class="menu-button mobile-menu__close" type="button" aria-label="Fermer le menu" data-menu-toggle>×</button>
        <nav aria-label="Navigation mobile">
          <a class="nav-musique" href="{% url 'musique' %}">Musique</a>
          <a class="nav-dessins" href="{% url 'dessins' %}">Dessins</a>
          <a class="nav-livres" href="{% url 'livres' %}">Livres</a>
          <a class="nav-dates" href="{% url 'posts' %}">Actualités</a>
          <a class="shop-link" href="https://shop.kent-artiste.com" target="_blank" rel="noopener noreferrer">Shop</a>
        </nav>
      </div>
    </div>
    {% block body %}{% endblock %}
    <footer class="site-footer">
      <div class="container site-footer__inner">
        <div class="site-footer__top">
          <a href="{% url 'home' %}" aria-label="Kent">
            <span class="logo" aria-hidden="true"></span>
          </a>
          <nav aria-label="Navigation secondaire">
            <a href="/mentions-legales">Mentions légales</a>
            <a href="/contact">Contact</a>
          </nav>
        </div>
        <hr />
        <p class="text-center small muted">© {% now "Y" %} Kent. Tous droits réservés.</p>
      </div>
    </footer>
    <script>
      (function () {
        var header = document.querySelector("[data-site-header]");
        var menu = document.querySelector("[data-mobile-menu]");
        var buttons = document.querySelectorAll("[data-menu-toggle]");
        function onScroll() {
          if (!header) return;
          header.classList.toggle("is-scrolled", window.scrollY > 10);
        }
        buttons.forEach(function (button) {
          button.addEventListener("click", function () {
            if (!menu) return;
            menu.classList.toggle("is-open");
          });
        });
        window.addEventListener("scroll", onScroll);
        onScroll();

        var hero = document.querySelector("[data-home-hero]");
        var heroImage = document.querySelector("[data-home-hero-image]");
        var heroContent = document.querySelector("[data-home-hero-content]");
        var desktopQuery = window.matchMedia("(min-width: 48rem)");
        var reducedMotionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
        var heroRaf = 0;
        function clamp01(value) {
          return Math.max(0, Math.min(1, value));
        }
        function setHeroStatic() {
          if (heroImage) heroImage.style.opacity = "1";
          if (heroContent) {
            heroContent.style.opacity = "1";
            heroContent.style.pointerEvents = "auto";
          }
        }
        function updateHero() {
          if (!hero || !heroImage) return;
          if (!desktopQuery.matches || reducedMotionQuery.matches) {
            setHeroStatic();
            return;
          }
          var fadeOutPx = 520;
          var opacity = clamp01(1 - window.scrollY / fadeOutPx);
          heroImage.style.opacity = String(opacity);
          if (heroContent) {
            var contentStartPx = Math.round(fadeOutPx * 0.45);
            var contentDurationPx = Math.max(1, Math.round(fadeOutPx * 0.2));
            var progress = (window.scrollY - contentStartPx) / contentDurationPx;
            var contentOpacity = clamp01(1 - progress);
            heroContent.style.opacity = String(contentOpacity);
            heroContent.style.pointerEvents = contentOpacity < 0.05 ? "none" : "auto";
          }
        }
        function onHeroScroll() {
          if (heroRaf) return;
          heroRaf = window.requestAnimationFrame(function () {
            heroRaf = 0;
            updateHero();
          });
        }
        if (hero) {
          window.addEventListener("scroll", onHeroScroll, { passive: true });
          desktopQuery.addEventListener("change", updateHero);
          reducedMotionQuery.addEventListener("change", updateHero);
          updateHero();
        }

        document.querySelectorAll("[data-music-albums-disclosure]").forEach(function (root) {
          var expand = root.querySelector("[data-music-albums-expand]");
          var collapse = root.querySelector("[data-music-albums-collapse]");
          var hiddenAlbums = root.querySelector("[data-music-albums-hidden]");
          if (!expand || !collapse || !hiddenAlbums) return;

          function setExpanded(isExpanded) {
            hiddenAlbums.hidden = !isExpanded;
            expand.hidden = isExpanded;
            collapse.hidden = !isExpanded;
            expand.setAttribute("aria-expanded", String(isExpanded));
            collapse.setAttribute("aria-expanded", String(isExpanded));
          }

          expand.addEventListener("click", function () {
            setExpanded(true);
          });
          collapse.addEventListener("click", function () {
            setExpanded(false);
            expand.focus();
          });
        });

        var videoModal = document.querySelector("[data-video-modal]");
        var videoModalFrame = document.querySelector("[data-video-modal-frame]");
        var lastVideoTrigger = null;
        function closeVideoModal() {
          if (!videoModal || !videoModalFrame) return;
          videoModal.hidden = true;
          videoModalFrame.replaceChildren();
          document.body.classList.remove("has-modal-open");
          if (lastVideoTrigger) lastVideoTrigger.focus();
        }
        function openVideoModal(trigger) {
          if (!videoModal || !videoModalFrame) return;
          var videoId = trigger.getAttribute("data-video-id");
          if (!videoId) return;
          lastVideoTrigger = trigger;
          var title = trigger.getAttribute("data-video-title") || "Vidéo";
          var iframe = document.createElement("iframe");
          iframe.src = "https://www.youtube.com/embed/" + encodeURIComponent(videoId) + "?autoplay=1&rel=0&origin=" + encodeURIComponent(window.location.origin);
          iframe.title = title;
          iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
          iframe.allowFullscreen = true;
          iframe.referrerPolicy = "strict-origin-when-cross-origin";
          videoModalFrame.replaceChildren(iframe);
          videoModal.hidden = false;
          document.body.classList.add("has-modal-open");
          var closeButton = videoModal.querySelector("[data-video-modal-close]");
          if (closeButton) closeButton.focus();
        }
        document.querySelectorAll("[data-video-modal-trigger]").forEach(function (trigger) {
          trigger.addEventListener("click", function (event) {
            if (!videoModal || !videoModalFrame) return;
            event.preventDefault();
            openVideoModal(trigger);
          });
        });
        document.querySelectorAll("[data-video-modal-close]").forEach(function (button) {
          button.addEventListener("click", closeVideoModal);
        });
        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape" && videoModal && !videoModal.hidden) {
            closeVideoModal();
          }
        });
      })();
    </script>
  </body>
</html>
